server {
    listen 127.0.0.1:8080;

    client_max_body_size 1M;

    error_page 100 /errors/100.html;
    error_page 200 /errors/200.html;
    error_page 301 /errors/301.html;
    error_page 399 /errors/399.html;
    error_page 600 /errors/600.html;
    error_page 999 /errors/999.html;

    location / {
        methods GET; 
        root www/html; 
        index index.html; 
        autoindex off; 
    }

}