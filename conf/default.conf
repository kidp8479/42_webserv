# WIIIP

# this is a default.conf, it's our fallback conf file when no argument is passed when launching ./webserv
# we also need to provide other conf files, those files will be the ones passed as argument to demonstrate all server features : CGI/upload etc

server {
    # 80 is standard HTTP port but on linux we need root rights to bind a port < 1024
    # we use 8080 to bypass that in the dev world
    # 127.0.0.1 to listen only locally (if we ever want to listen on all interfaces : 0.0.0.0)
    listen 127.0.0.1:8080;

    # the default value for client_max_body_size directive in nginx is 1 MB
    client_max_body_size 1M;

    # common HTTP errors a server can encounter - all mapped to a dedicated html page
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 501 /errors/501.html;
    error_page 505 /errors/505.html;

    # all location blocks, one per feature required by the subject

    # serving static files
    location / {
        methods GET; # only static files served here, no need for other methods
        root www/html; # files to serve are looked up in this folder
        index index.html; # if the request points to a directory (ex: /), default to index.html
        autoindex off; # no directory listing (only useful for public download folders)
    }

    # file upload
    location /uploads {
        methods POST; # only POST needed, we store files not serve them
        upload_path www/uploads; # where uploaded files are stored on the server
        autoindex off;
    }

    # error pages
    location /errors {
        methods GET; # read-only html pages
        root www/errors; # where the error pages are located on disk
        # no index directive - we never point to the folder, always to a specific file (ex: /errors/404.html)
        autoindex off;
    }

    # redirection - no root, no methods needed, just a code and a destination
    location /redirect {
        return 301 /; # 301 = moved permanently, redirects to /
    }

    # CGI - executes scripts based on file extension
    location /cgi-bin {
        methods GET POST; # GET to request a script, POST to send data to it
        root www/cgi-bin; # where OUR CGI scripts are located (html will be generated at run time)
        cgi .php /usr/bin/php-cgi; # .php files executed with php-cgi - where the binary to execute some php is - this is machine dependant, needs to check at school IF php-cgi is installed
        cgi .py /usr/bin/python3;  # .py files executed with python3 - this is machine dependant, needs to check at school IF python is installed
        autoindex off;
    }
}

# second server block on a different port - demonstrates the subject requirement:
# "your server must be able to listen to multiple ports to deliver different content"
server {
    listen 127.0.0.1:8081;

    client_max_body_size 1M;

    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 501 /errors/501.html;
    error_page 505 /errors/505.html;

    location / {
        methods GET;
        root www/html2; # serves different content than port 8080
        index index.html;
        autoindex off;
    }

}
